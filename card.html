<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Nota Strappata</title>
<style>
  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 300px;
    height: 200px;
    perspective: 1000px;
    cursor: pointer;
  }

  .inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s;
  }

  .card.flipped .inner {
    transform: rotateY(180deg);
  }

  .side {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    background: #e8d8a8;
    border: 2px solid #444;
    padding: 15px;
    font-family: monospace;
  }

  .back {
    transform: rotateY(180deg);
    background: #d8c090;
  }
</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="inner">
    <div class="side">
      <p>“Non fidarti del Vault…”</p>
      <p>“…loro stanno…”</p>
    </div>
    <div class="side back">
      <p>“…nelle pareti.”</p>
      <p>“Ti vedono.”</p>
    </div>
  </div>
</div>

<script>
function flipCard(card) {
  card.classList.toggle("flipped");
}
</script>

</body>
</html>
