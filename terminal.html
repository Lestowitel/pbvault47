<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout.css by zAlweNy26</title>
    <link rel="icon" href="./fallout-boy.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./fallout.css" />
</head>
<body class="bg-stone-800 fo-selection fo-ui overflow-hidden">
    <main class="w-screen h-screen bg-terminal flex">
        
  <div id="terminal" class="bg-black bg-terminal fo-terminal text-2xl p-6 fg-pb fo-glow w-full h-full overflow-y-auto">
    <div id="output" class="whitespace-pre-wrap leading-tight"> 
    </div></div>
        <script>
const text = `Welcome to ROBCO Industries (TM) Termlink
                         LOG GIORNO 1

Fine turno lavorativo registrato per i soggetti:
ASH
IAN
LIVIA

Anomalia rilevata: interferenze non identificate sui terminali personali.

I soggetti, separatamente, hanno rimosso le interferenze manualmente,
ottenendo accesso a file non presenti negli archivi standard.
Origine dei file: DATI OSCURATI.

Motivazione e cooperazione elevate.
Nessun intoppo significativo.

INTERROGATORIO PERSONALE
Guardia MARA: collaborazione ottenuta.
Sovrintendente RICHARD: pressione riuscita.

Rivelazione critica:
VAULT 47 non è un rifugio standard.
Designazione reale: STRUTTURA DI TEST SPERIMENTALI SU POPOLAZIONE INTERNA.

Per ulteriori informazioni, necessario l’accesso al LIVELLO 3.
Livello precedentemente non segnalato in nessuna mappa ufficiale.

LIVELLO 3 - SEZIONE LABORATORI

Scoperta su banco operatorio:
Soggetto femminile: sorella di IAN.
Unità robotica: ASSAULTRON, modello sconosciuto.

Stato iniziale:
Unità non ostile.
Sovrintendente RICHARD neutralizzato temporaneamente
(trauma non letale).ASH ha effettuato accesso ai sistemi dell’unità robotica.
Risultato:
Protocolli di attacco disattivati.
Routine emotive non conformi a IA militare standard rilevate.

Frasi ripetute dall’unità:
"Il cielo della superficie è bellissimo."
"Vorrei vederlo."

ERRORE LOGICO
SOTTOPROCESSI EMOTIVI ATTIVI

Situazione critica:
IAN stabilizza la sorella tramite STIMPACK.
Sovrintendente RICHARD riportato in condizioni stabili.
Confermato stato inerme dell’ASSAULTRON
dopo perdita di un arto.

AVVISO FINALE

Il Sovrintendente segnala una trasmissione in arrivo
dal proprio Pip-Boy.

Fonte del segnale:
PORTA PRINCIPALE DEL VAULT

Stato:
APERTA

Responsabile rilevato:
CANIS LUPUS FAMILIARIS (?)

CLASSIFICAZIONE: NON DETERMINATA

END LOG
SYSTEM STANDBY

`;

const output = document.getElementById("output");
const terminal = document.getElementById("terminal");

let i = 0;

function typeWriter() {
    if (i < text.length) {
        output.textContent += text.charAt(i);
        i++;

        // auto scroll
        terminal.scrollTop = terminal.scrollHeight;

        setTimeout(typeWriter, 20); // velocità (più basso = più veloce)
    }
}

typeWriter();
</script>
        </div>
    </div>
    <script>
        const tabs = document.querySelectorAll('.fo-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('fo-tab-active'));
                tab.classList.add('fo-tab-active');
            });
        });
    </script>
</body>
</html>
