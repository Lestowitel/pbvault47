<!DOCTYPE html>
 <script type="module" src="frontend/eslint.config.js"></script>
<html>
 <head>
  <meta charset="UTF-8">
  <title>Pip-Boy Vault 47</title>
</head>
<body style="background:black; color:#00ff88; font-family: monospace; margin:0; padding:0;">
  <!-- Container principale Pip-Boy -->
  <div id="pipboy-container" style="width:100%; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px;">
    <h1>PIP-BOY Vault 47</h1>

    <!-- Menu principale -->
    <div id="menu" style="margin-top:20px;">
      <button onclick="showSection('stat')">STAT</button>
      <button onclick="showSection('inv')">INV</button>
      <button onclick="showSection('data')">DATA</button>
      <button onclick="showSection('radio')">RADIO</button>
    </div>

    <!-- Sezioni dinamiche -->
    <div id="content" style="margin-top:30px; width:100%; max-width:600px; background:#001100; padding:20px; min-height:300px;">
      <p>Seleziona un menu per iniziare.</p>
    </div>
  </div>

  <script>
    // Funzione base per mostrare le sezioni
    function showSection(section) {
      const content = document.getElementById('content');
      if(section === 'stat') {
        content.innerHTML = "<h2>STAT</h2><p>Qui visualizzerai le statistiche del personaggio.</p>";
      } else if(section === 'inv') {
        content.innerHTML = "<h2>INV</h2><p>Qui ci sarà l'inventario.</p>";
      } else if(section === 'data') {
        content.innerHTML = "<h2>DATA</h2><p>Qui ci saranno terminali, quest e NPC.</p>";
      } else if(section === 'radio') {
        content.innerHTML = "<h2>RADIO</h2><p>Qui ci saranno le stazioni radio con audio.</p>";
      }
    }
  </script>
</body>
</html>
