<!DOCTYPE html>    <link rel="stylesheet" href="./fallout.css" />
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="icon" href="./fallout-boy.png">
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-stone-800 fo-selection fo-ui">
    <main class="p-4 space-y-4 bg-terminal flex flex-col gap-2">
        <div class="p-1 flex flex-wrap gap-2">
            <h2 class="text-2xl font-bold fg-pb fo-glow">AP 100/100</h2>
  
        </div>
        
        <div class="text-lg fo-terminal bg-pb fg-pb fo-glow p-1">
            <p>Welcome to Fallout.css! This is a simple page.</p>
        </div>
       
        <div role="tablist" class="fo-tabs fo-glow">
            <a role="tab" class="fo-tab">Stat</a>
            <a role="tab" class="fo-tab fo-tab-active">Inv</a>
            <a role="tab" class="fo-tab">Data</a>
            <a role="tab" class="fo-tab">Map</a>
            <a role="tab" class="fo-tab">Radio</a>
        </div>
        <div class="flex flex-wrap gap-2">
            <button class="fo-btn fo-shadow">Button</button>
           
        </div>
        <ul class="fo-list fg-pb fo-glow">
            <li>Minigun</li>
            <li>Plasma Rifle</li>
            <li>Missile Launcher</li>
        </ul>
        <div class="flex flex-wrap gap-2">
            <progress class="w-56 fo-progress fo-shadow" value="5" max="10"></progress>
     
        </div>
        
    </main>
   
</div>
    </div>
    <script>
        const tabs = document.querySelectorAll('.fo-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('fo-tab-active'));
                tab.classList.add('fo-tab-active');
            });
        });
    </script>
</body>
</html>
